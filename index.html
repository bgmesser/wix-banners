<style>

html,
body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:transparent;
}

/* Banner */

.banner{
    width:100%;
    height:210px;
    overflow:hidden;
    display:flex;
    align-items:center;
    position:relative;

    /* Fade edges */
    -webkit-mask-image:linear-gradient(
        to right,
        transparent 0%,
        black 8%,
        black 92%,
        transparent 100%
    );

    mask-image:linear-gradient(
        to right,
        transparent 0%,
        black 8%,
        black 92%,
        transparent 100%
    );
}

/* Moving logos */

.track{
    display:flex;
    align-items:center;
    gap:60px;
    width:max-content;
    animation:scroll 55s linear infinite;
}

/* Pause on hover */

.track:hover{
    animation-play-state:paused;
}

/* Logos */

.track img{

    height:160px;
    width:auto;

    flex-shrink:0;
    display:block;

    transition:transform .25s ease;
}

/* Tiny hover zoom */

.track img:hover{
    transform:scale(1.06);
}

@keyframes scroll{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }

}

</style>

</head>
